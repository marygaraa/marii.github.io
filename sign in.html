<!DOCTYPE html>
<html>
<head>
<title>Sign Up | TMJ Luxuria</title>
<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.box{
    background:#111;
    padding:40px;
    width:350px;
    border:1px solid gold;
    text-align:center;
}

h2{
    color:gold;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:black;
    border:1px solid #444;
    color:white;
}

button{
    width:100%;
    padding:12px;
    background:gold;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

a{
    color:gold;
    text-decoration:none;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Create Account</h2>
    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Sign Up</button>
    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

</body>
</html>
