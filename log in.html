<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #8b5a2b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #a8651d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #8b5a2b;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    // Default account
    let correctUser = "Marcfrancisperez";
    let correctPass = "marcfrancis2009";

    if (username === correctUser && password === correctPass) {
        alert("Login Successful!");
        window.location.href = "fronts.html";
    } else {
        alert("Invalid Username or Password");
    }
}
</script>

</body>
</html>
